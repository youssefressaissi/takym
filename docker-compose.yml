version: '3.8'

services:
  # Service 1: Ollama (The AI Server)
  ollama:
    image: ollama/ollama
    container_name: ollama_service
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Service 2: The Python App (Labeler)
  app:
    build: .
    container_name: python_labeler
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - .:/app

  # Service 3: The Trainer (Moved inside services)
  trainer:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: taqyim_trainer
    volumes:
      - .:/app
      # This line saves the 2GB model download to your hard drive
      - hf_cache:/root/.cache/huggingface 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '2gb'

volumes:
  ollama_data:
  hf_cache: # Define the new volume here